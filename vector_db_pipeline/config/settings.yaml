# ============================================================
# Vector DB Pipeline — Configuration
# ============================================================

# --- Pipeline behavior ---
pipeline:
  batch_size: 50

# --- Data paths ---
data:
  raw_dir: "/Users/sohn/Desktop/Vector_DB"
  output_dir: "/Users/sohn/Desktop/Vector_DB/vector_db_pipeline/data/processed"
  artifact_dir: "/Users/sohn/Desktop/Vector_DB/vector_db_pipeline/data/artifacts"

# --- VLM (Ollama) ---
# Run locally: ollama pull qwen2.5-vl:7b && ollama serve
# OLLAMA_API_BASE env var overrides api_base at runtime.
vlm:
  api_base: "http://localhost:11434/v1"
  model_name: "qwen2.5-vl:7b"
  max_tokens: 2048
  temperature: 0.1
  health_check_retries: 3
  health_check_delay: 5

# --- Text embedding (Qwen3-Embedding-0.6B, HuggingFace transformers) ---
# quantization: "int8" applies bitsandbytes INT8 when CUDA is available.
# Falls back to float16 on MPS and float32 on CPU automatically.
embed_text:
  model_name: "Qwen/Qwen3-Embedding-0.6B"
  batch_size: 32
  quantization: "int8"

# --- Qdrant (local Docker) ---
# Start with: docker run -p 6333:6333 qdrant/qdrant
qdrant:
  url: "http://localhost:6333"
  api_key: ""
  collection_name: "exam_questions"
  text_dim: 1024

# --- Query agent ---
query:
  default_limit: 5
  answer_context_limit: 3
  parse_prompt: |
    Given this query: "{query}"
    Return ONLY valid JSON:
    {{"topic": "...", "limit": 5}}
    - topic: the mathematical concept or subject area (in Korean if possible)
    - limit: number of results requested (default 5)
  answer_prompt: |
    Answer the user query using only the retrieved context.
    User query: "{query}"

    Retrieved context:
    {context}

    Write a concise answer in Korean. If the context is not enough, say what is missing.
